<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}StaffHub{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" href="{{ url_for('dashboard') if g.current_user else url_for('login') }}">StaffHub</a>
            {% if g.current_user %}
            <nav class="nav">
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('records') }}">Records</a>
                <a href="{{ url_for('new_record') }}">New Record</a>
                <a href="{{ url_for('profile') }}">Profile</a>
                <form method="post" action="{{ url_for('logout') }}" class="inline-form">
                    <button type="submit" class="link-button">Logout</button>
                </form>
            </nav>
            {% endif %}
        </div>
    </header>

    <main class="container page">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <section class="flash-list" aria-label="Messages">
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
                </section>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
